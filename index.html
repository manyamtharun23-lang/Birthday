<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrisha Birthday Surprise</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#89f7fe,#66a6ff,#b388ff);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    font-family:Arial,sans-serif;
    overflow:hidden;
    color:white;
}

.card{
    width:85%;
    max-width:420px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    text-align:center;
    box-shadow:0 0 25px rgba(255,255,255,0.15);
    animation:fade 1s ease;
}

.hidden{
    display:none;
}

h1{
    font-size:2rem;
}

p{
    font-size:1.1rem;
    line-height:1.8;
}

button{
    margin:10px;
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:white;
    color:#5b4b8a;
    font-weight:bold;
    cursor:pointer;
    font-size:1rem;
}

.cake{
    font-size:5rem;
    cursor:pointer;
    animation:pulse 2s infinite;
}

.final{
    animation:heartbeat 1.5s infinite;
}

.secret{
    margin-top:15px;
    font-size:0.9rem;
    opacity:0.8;
    cursor:pointer;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.05);}
    50%{transform:scale(1);}
    75%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

</style>
</head>

<body>
